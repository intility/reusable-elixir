name: CI

on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Run tests, linting, and static analysis
  test:
    uses: intility/reusable-elixir/.github/workflows/elixir-test.yaml@v1
    with:
      # Elixir and OTP versions
      elixir-version: "1.18"
      otp-version: "27"

      # Static analysis (all default to true except sobelow)
      audit: true
      credo: true
      dialyzer: true
      # sobelow: true  # Enable for Phoenix projects

      # Database support
      # postgres: true
      # postgres-version: "17"
      # ash-postgres: true   # For Ash Framework projects
      # ecto-postgres: true  # For Ecto projects

      # SQLite support (Ash)
      # sqlite: true

      # Phoenix assets
      # npm-install: true
      # npm-working-directory: assets
      # node-version: "22"

      # Spark DSL formatter
      # spark-formatter: true

      # Private Hex packages
      # hex-organization: intility
    # secrets:
    #   hex-organization-key: ${{ secrets.HEX_ORGANIZATION_KEY }}

  # Build and push OCI container image
  release:
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: intility/reusable-elixir/.github/workflows/elixir-release.yaml@v1
    with:
      # Project directory (default: ".")
      directory: .

      # Elixir and OTP versions
      elixir-version: "1.19"
      otp-version: "28"

      # Build and push OCI image (default: true)
      docker: true

      # Enable reproducible builds and layer caching
      source-date-epoch: "0"

      # Optional: Override base image (defaults to project config)
      # base-image: "elixir:1.19-slim"

      # Optional: Multi-platform builds (requires include_erts: false)
      # platforms: "linux/amd64,linux/arm64"

      # Optional: Release name if multiple releases configured
      # release: "my_app"

      # Optional: Custom tags (defaults shown below)
      # tags: |
      #   type=schedule
      #   type=ref,event=branch
      #   type=ref,event=pr
      #   type=semver,pattern={{version}}
      #   type=semver,pattern={{major}}.{{minor}}

      # Private Hex packages
      # hex-organization: intility
    secrets: inherit
