name: Mix Dialyzer
description: Run Dialyzer with PLT caching

inputs:
  mix-env:
    description: MIX_ENV to use
    required: true
  plt-path:
    description: Path to store PLT files
    required: false
    default: priv/plts

runs:
  using: composite
  steps:
    - name: Restore PLT cache
      id: plt-cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ inputs.plt-path }}
        key: plt-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          plt-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.tool-versions') }}-

    - name: Build PLT
      if: steps.plt-cache.outputs.cache-hit != 'true'
      shell: bash
      run: mix dialyzer --plt
      env:
        MIX_ENV: ${{ inputs.mix-env }}

    - name: Run Dialyzer
      shell: bash
      run: mix dialyzer --format github
      env:
        MIX_ENV: ${{ inputs.mix-env }}
