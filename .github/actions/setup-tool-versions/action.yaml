name: Setup .tool-versions
description: Generate .tool-versions file from inputs, or use existing file

inputs:
  elixir-version:
    description: Elixir version (uses existing .tool-versions if not specified)
    required: false
  otp-version:
    description: Erlang/OTP version (uses existing .tool-versions if not specified)
    required: false
  working-directory:
    description: Directory where .tool-versions should be written
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate inputs
      if: ${{ (inputs.elixir-version != '' && inputs.otp-version == '') || (inputs.elixir-version == '' && inputs.otp-version != '') }}
      shell: bash
      run: |
        echo "::error::Both elixir-version and otp-version must be provided together, or neither"
        exit 1

    - name: Generate .tool-versions
      if: ${{ inputs.elixir-version != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ELIXIR_VERSION: ${{ inputs.elixir-version }}
        OTP_VERSION: ${{ inputs.otp-version }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        echo "elixir ${ELIXIR_VERSION}" > .tool-versions
        echo "erlang ${OTP_VERSION}" >> .tool-versions
        echo "Generated .tool-versions in ${WORKING_DIR}:"
        cat .tool-versions
