name: Setup SSH Agent
description: Setup SSH agent for private Git repositories (skips if no key provided)

inputs:
  ssh-private-key:
    description: SSH private key(s) for accessing private Git repositories
    required: false

runs:
  using: composite
  steps:
    - name: Setup SSH agent
      if: ${{ inputs.ssh-private-key != '' }}
      uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
