name: Build and Push OCI Image
description: Build and push OCI images using ocibuild

inputs:
  tags:
    description: Semicolon-separated full image refs (e.g., from docker/metadata-action)
    required: true
  registry:
    description: Registry host to push to (e.g., ghcr.io). Do not include org/repo path - tags already contain full image refs.
    required: true
  base-image:
    description: Override base image for ocibuild
    required: false
  platforms:
    description: Target platforms for multi-arch builds (e.g., linux/amd64,linux/arm64)
    required: false
  release:
    description: Release name if multiple releases are configured
    required: false
  source-date-epoch:
    description: SOURCE_DATE_EPOCH for reproducible builds and layer caching (unset by default)
    required: false
  pull-username:
    description: Username for pulling base image (defaults to push-username)
    required: false
  pull-password:
    description: Password/token for pulling base image (defaults to push-password)
    required: false
  push-username:
    description: Registry username for pushing
    required: true
  push-password:
    description: Registry password/token for pushing
    required: true
  directory:
    description: Working directory for running mix ocibuild
    required: false
    default: "."

outputs:
  digest:
    description: Image digest (sha256:...) for attestation
    value: ${{ steps.ocibuild.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Build and push OCI image
      id: ocibuild
      env:
        MIX_ENV: prod
        OCIBUILD_PULL_USERNAME: ${{ inputs.pull-username }}
        OCIBUILD_PULL_PASSWORD: ${{ inputs.pull-password }}
        OCIBUILD_PUSH_USERNAME: ${{ inputs.push-username }}
        OCIBUILD_PUSH_PASSWORD: ${{ inputs.push-password }}
        INPUT_SOURCE_DATE_EPOCH: ${{ inputs.source-date-epoch }}
        INPUT_TAGS: ${{ inputs.tags }}
        INPUT_BASE_IMAGE: ${{ inputs.base-image }}
        INPUT_PLATFORMS: ${{ inputs.platforms }}
        INPUT_RELEASE: ${{ inputs.release }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: |

        # Set SOURCE_DATE_EPOCH if provided (for reproducible builds and layer caching)
        if [ -n "${INPUT_SOURCE_DATE_EPOCH}" ]; then
          export SOURCE_DATE_EPOCH="${INPUT_SOURCE_DATE_EPOCH}"
        fi

        # Build argument array safely
        ARGS=()
        ARGS+=(--tag "${INPUT_TAGS}")
        ARGS+=(-a "org.opencontainers.image.created=$(date +%s)")

        # Add optional base image override
        if [ -n "${INPUT_BASE_IMAGE}" ]; then
          ARGS+=(--base "${INPUT_BASE_IMAGE}")
        fi

        # Add optional platforms for multi-arch
        if [ -n "${INPUT_PLATFORMS}" ]; then
          ARGS+=(--platform "${INPUT_PLATFORMS}")
        fi

        # Add optional release name
        if [ -n "${INPUT_RELEASE}" ]; then
          ARGS+=(--release "${INPUT_RELEASE}")
        fi

        # Build and push in one step
        OUTPUT=$(mix ocibuild "${ARGS[@]}" --push "${INPUT_REGISTRY}" 2>&1 | tee /dev/stderr)

        # Extract digest from output (format: sha256:...)
        DIGEST=$(echo "$OUTPUT" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)

        if [ -z "$DIGEST" ]; then
          echo "::error::Failed to extract digest from ocibuild output"
          exit 1
        fi

        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
