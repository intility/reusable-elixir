name: Mix Deps Get
description: Install Hex, Rebar, and fetch Mix dependencies

inputs:
  directory:
    description: Directory containing the Elixir project
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install Hex
      shell: bash
      run: mix local.hex --if-missing --force

    - name: Install Rebar
      shell: bash
      run: mix local.rebar --if-missing --force

    - name: Fetch dependencies
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: mix deps.get
