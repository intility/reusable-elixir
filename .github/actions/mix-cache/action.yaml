name: Mix Cache
description: Cache Mix dependencies and build artifacts

inputs:
  mix-env:
    description: MIX_ENV to cache for
    required: false
    default: test
  cache-build:
    description: Whether to cache _build/ directory (set to false for deps-only caching)
    required: false
    default: "true"
  directory:
    description: Directory containing the Elixir project
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Restore deps cache
      id: deps-cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ inputs.directory }}/deps
        key: ${{ runner.os }}-deps-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-${{ hashFiles(format('{0}/mix.lock', inputs.directory)) }}
        restore-keys: |
          ${{ runner.os }}-deps-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-

    - name: Restore build cache
      if: inputs.cache-build == 'true'
      id: build-cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ inputs.directory }}/_build/${{ inputs.mix-env }}
        key: ${{ runner.os }}-build-${{ inputs.mix-env }}-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-${{ hashFiles(format('{0}/mix.lock', inputs.directory)) }}-${{ hashFiles(format('{0}/**/*.ex', inputs.directory), format('{0}/**/*.exs', inputs.directory)) }}
        restore-keys: |
          ${{ runner.os }}-build-${{ inputs.mix-env }}-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-${{ hashFiles(format('{0}/mix.lock', inputs.directory)) }}-

    - name: Clean stale deps on partial cache hit
      if: steps.deps-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        DIRECTORY: ${{ inputs.directory }}
      run: |
        if [ -d "${DIRECTORY}/deps" ]; then
          echo "Deps restored from partial cache match, cleaning to prevent stale versions"
          rm -rf "${DIRECTORY}/deps"
        fi

    - name: Touch cached deps files
      if: steps.deps-cache.outputs.cache-hit == 'true'
      shell: bash
      env:
        DIRECTORY: ${{ inputs.directory }}
      run: find "${DIRECTORY}/deps" -type f -exec touch {} + 2>/dev/null || true

    - name: Touch cached build files
      if: steps.build-cache.outputs.cache-hit == 'true'
      shell: bash
      env:
        DIRECTORY: ${{ inputs.directory }}
        MIX_ENV_NAME: ${{ inputs.mix-env }}
      run: find "${DIRECTORY}/_build/${MIX_ENV_NAME}" -type f -exec touch {} + 2>/dev/null || true
