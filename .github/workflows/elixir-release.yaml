name: Build and push Elixir release

on:
  workflow_call:
    inputs:
      directory:
        type: string
        default: "."
        description: The directory where the Elixir project is located
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages (e.g., intility)
      docker:
        type: boolean
        default: true
        description: Whether to build and push the OCI image to the container registry
      base-image:
        type: string
        required: false
        description: Override base image for ocibuild (e.g., elixir:1.19-slim)
      platforms:
        type: string
        required: false
        description: Target platforms for multi-arch builds (e.g., linux/amd64,linux/arm64)
      release:
        type: string
        required: false
        description: Release name if multiple releases are configured
      tags:
        type: string
        required: false
        description: "Tags for the docker image, see https://github.com/docker/metadata-action"
        default: |
          type=schedule
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
      source-date-epoch:
        type: string
        required: false
        description: "SOURCE_DATE_EPOCH for reproducible builds (use '0' for layer caching)"
      tailwind-install:
        type: boolean
        default: false
        description: Run mix tailwind.install to download the Tailwind binary
      npm-install:
        type: boolean
        default: false
        description: Run npm install for assets
      npm-working-directory:
        type: string
        default: assets
        description: Directory for npm install
      npm-registry:
        type: string
        required: false
        description: Custom NPM registry URL (e.g., https://npm.pkg.github.com)
      node-version:
        type: string
        default: latest
        description: Node.js version
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key for private packages
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories (supports multiple keys)
      npm-token:
        required: false
        description: NPM authentication token for private registries
      pull-username:
        required: false
        description: Username for pulling base image (defaults to github.actor)
      pull-password:
        required: false
        description: Password/token for pulling base image (defaults to GITHUB_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: intility/reusable-elixir/.github/actions/apt-packages@main
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}

      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/ssh-agent@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - name: Setup Elixir
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9 # v1.20.4
        with:
          version-file: ${{ inputs.directory }}/.tool-versions
          version-type: strict

      - name: Restore dependencies cache
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: |
            ${{ inputs.directory }}/deps
            ${{ inputs.directory }}/_build
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-

      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        run: mix hex.organization auth ${{ inputs.hex-organization }} --key ${{ secrets.hex-organization-key }}
        env:
          MIX_ENV: prod

      - name: Install dependencies
        run: mix deps.get
        env:
          MIX_ENV: prod

      - name: Setup Node
        if: ${{ inputs.npm-install }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.npm-registry }}
          cache: npm
          cache-dependency-path: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}/package-lock.json

      - name: Run npm install
        if: ${{ inputs.npm-install }}
        run: npm ci
        working-directory: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      - name: Install Tailwind
        if: ${{ inputs.tailwind-install }}
        run: mix tailwind.install
        env:
          MIX_ENV: prod

      - name: Compile
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: prod

      - name: Deploy assets
        if: ${{ inputs.npm-install }}
        run: mix assets.deploy
        env:
          MIX_ENV: prod

      - name: Build release
        if: ${{ inputs.docker }}
        run: mix release --overwrite
        env:
          MIX_ENV: prod

      - name: Docker meta
        if: ${{ inputs.docker }}
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          sep-tags: ";"
          tags: ${{ inputs.tags }}

      - name: Login to GHCR
        if: ${{ inputs.docker }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        if: ${{ inputs.docker }}
        id: ocibuild
        uses: intility/reusable-elixir/.github/actions/ocibuild@main
        with:
          tags: ${{ steps.meta.outputs.tags }}
          registry: ghcr.io
          base-image: ${{ inputs.base-image }}
          platforms: ${{ inputs.platforms }}
          release: ${{ inputs.release }}
          source-date-epoch: ${{ inputs.source-date-epoch }}
          pull-username: ${{ secrets.pull-username }}
          pull-password: ${{ secrets.pull-password }}
          push-username: ${{ github.actor }}
          push-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation
        if: ${{ inputs.docker }}
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-digest: ${{ steps.ocibuild.outputs.digest }}
          subject-name: ghcr.io/${{ github.repository }}
          push-to-registry: true
