name: Build and push Elixir release

on:
  workflow_call:
    inputs:
      directory:
        type: string
        default: "."
        description: The directory where the Elixir project is located
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages (e.g., intility)
      docker:
        type: boolean
        default: true
        description: Whether to build and push the OCI image to the container registry
      base-image:
        type: string
        required: false
        description: Override base image for ocibuild (e.g., elixir:1.19-slim)
      platforms:
        type: string
        required: false
        description: Target platforms for multi-arch builds (e.g., linux/amd64,linux/arm64)
      release:
        type: string
        required: false
        description: Release name if multiple releases are configured
      tags:
        type: string
        required: false
        description: "Tags for the docker image, see https://github.com/docker/metadata-action"
        default: |
          type=schedule
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
      source-date-epoch:
        type: string
        required: false
        description: "SOURCE_DATE_EPOCH for reproducible builds (use '0' for layer caching)"
      assets-deploy:
        type: boolean
        default: false
        description: Run mix assets.deploy to build and digest static assets before release
      tailwind-install:
        type: boolean
        default: false
        description: Run mix tailwind.install to download the Tailwind binary
      npm-install:
        type: boolean
        default: false
        description: Run npm install for assets
      npm-working-directory:
        type: string
        default: assets
        description: Directory for npm install
      npm-registry:
        type: string
        required: false
        description: Custom NPM registry URL (e.g., https://npm.pkg.github.com)
      node-version:
        type: string
        default: latest
        description: Node.js version
      env:
        type: string
        required: false
        description: |
          Environment variables to set for the release job (one KEY=VALUE per line).
          Example:
            env: |
              MY_VAR=value
              MY_OTHER_VAR=value
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
      artifacts:
        type: string
        required: false
        description: |
          Multiline artifact definitions to download before compilation (one per line, format: name:path).
          Use with actions/upload-artifact in a prior job to inject pre-built binaries.
          Example:
            artifacts: |
              my-binary:apps/my_app/priv/bin
              my-assets:apps/my_app/priv/static
      image-name:
        type: string
        required: false
        description: "Image name without registry prefix (e.g., my-app or my-org/my-app). Will be prefixed with ghcr.io/<owner>/. Defaults to the repository name."
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key for private packages
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories (supports multiple keys)
      npm-token:
        required: false
        description: NPM authentication token for private registries
      pull-username:
        required: false
        description: Username for pulling base image (defaults to github.actor)
      pull-password:
        required: false
        description: Password/token for pulling base image (defaults to GITHUB_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: intility/reusable-elixir/.github/actions/set-env@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}

      - uses: intility/reusable-elixir/.github/actions/apt-packages@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}

      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/ssh-agent@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - name: Setup Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4 # v1.21.0
        with:
          version-file: ${{ inputs.directory }}/.tool-versions
          version-type: strict

      - name: Restore dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ inputs.directory }}/deps
            ${{ inputs.directory }}/_build
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles(format('{0}/.tool-versions', inputs.directory)) }}-

      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        env:
          MIX_ENV: prod
          HEX_ORG: ${{ inputs.hex-organization }}
          HEX_ORG_KEY: ${{ secrets.hex-organization-key }}
        run: mix hex.organization auth "${HEX_ORG}" --key "${HEX_ORG_KEY}"

      - name: Install dependencies
        run: mix deps.get
        env:
          MIX_ENV: prod

      - uses: intility/reusable-elixir/.github/actions/download-artifacts@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
          directory: ${{ inputs.directory }}

      - name: Setup Node
        if: ${{ inputs.npm-install }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.npm-registry }}
          cache: npm
          cache-dependency-path: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}/package-lock.json

      - name: Run npm install
        if: ${{ inputs.npm-install }}
        run: npm ci
        working-directory: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      - name: Install Tailwind
        if: ${{ inputs.tailwind-install }}
        run: mix tailwind.install
        env:
          MIX_ENV: prod

      - name: Compile
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: prod

      - name: Deploy assets
        if: ${{ inputs.npm-install || inputs.assets-deploy }}
        run: mix assets.deploy
        env:
          MIX_ENV: prod

      - name: Build release
        if: ${{ inputs.docker }}
        run: mix release ${{ inputs.release }} --overwrite
        env:
          MIX_ENV: prod

      - name: Docker meta
        if: ${{ inputs.docker }}
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name || github.event.repository.name }}
          sep-tags: ";"
          tags: ${{ inputs.tags }}

      - name: Login to GHCR
        if: ${{ inputs.docker }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        if: ${{ inputs.docker }}
        id: ocibuild
        uses: intility/reusable-elixir/.github/actions/ocibuild@8538d07c58d0c44e844e68a773ec729f21ee4ed7 # v2.1.0
        with:
          tags: ${{ steps.meta.outputs.tags }}
          registry: ghcr.io
          directory: ${{ inputs.directory }}
          base-image: ${{ inputs.base-image }}
          platforms: ${{ inputs.platforms }}
          release: ${{ inputs.release }}
          source-date-epoch: ${{ inputs.source-date-epoch }}
          pull-username: ${{ secrets.pull-username }}
          pull-password: ${{ secrets.pull-password }}
          push-username: ${{ github.actor }}
          push-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation
        if: ${{ inputs.docker }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-digest: ${{ steps.ocibuild.outputs.digest }}
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name || github.event.repository.name }}
          push-to-registry: true
