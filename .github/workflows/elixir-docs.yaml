name: Build and deploy Elixir docs

on:
  workflow_call:
    inputs:
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
      env:
        type: string
        required: false
        description: |
          Environment variables to set (one KEY=VALUE per line).
          Example:
            env: |
              CLOAK_KEY=base64encodedkey
      artifacts:
        type: string
        required: false
        description: |
          Multiline artifact definitions to download before compilation (one per line, format: name:path).
          Example:
            artifacts: |
              my-binary:apps/my_app/priv/bin
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
      - uses: intility/reusable-elixir/.github/actions/mix-cache@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        with:
          mix-env: dev
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@bf5899eb8f897af6da47d33ac9836c700ce77219 # v3.2.0
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        env:
          HEX_ORG: ${{ inputs.hex-organization }}
          HEX_ORG_KEY: ${{ secrets.hex-organization-key }}
        run: mix hex.organization auth "${HEX_ORG}" --key "${HEX_ORG_KEY}"
      - uses: intility/reusable-elixir/.github/actions/mix-deps-get@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
      - uses: intility/reusable-elixir/.github/actions/mix-docs@dafe26e762d178097fe0a890115409005dd49985 # v3.2.0
        with:
          mix-env: dev
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: doc/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
