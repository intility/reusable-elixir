name: Build and deploy Elixir docs

on:
  workflow_call:
    inputs:
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
      env:
        type: string
        required: false
        description: |
          Environment variables to set (one KEY=VALUE per line).
          Example:
            env: |
              CLOAK_KEY=base64encodedkey
      artifacts:
        type: string
        required: false
        description: |
          Multiline artifact definitions to download before compilation (one per line, format: name:path).
          Example:
            artifacts: |
              my-binary:apps/my_app/priv/bin
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
      - uses: intility/reusable-elixir/.github/actions/mix-cache@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        with:
          mix-env: dev
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        env:
          HEX_ORG: ${{ inputs.hex-organization }}
          HEX_ORG_KEY: ${{ secrets.hex-organization-key }}
        run: mix hex.organization auth "${HEX_ORG}" --key "${HEX_ORG_KEY}"
      - uses: intility/reusable-elixir/.github/actions/mix-deps-get@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
      - uses: intility/reusable-elixir/.github/actions/mix-docs@8da71a9d5c34808dc7d4325bd221f6cac7f2a1e4 # v1.6.1
        with:
          mix-env: dev
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: doc/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
