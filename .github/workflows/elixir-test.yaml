name: Test Elixir

on:
  workflow_call:
    inputs:
      directory:
        type: string
        default: "."
        description: The directory where the Elixir project is located
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      audit:
        type: boolean
        default: true
        description: Run hex.audit and deps.audit
      credo:
        type: boolean
        default: true
        description: Run Credo static analysis
      dialyzer:
        type: boolean
        default: false
        description: Run Dialyzer type checking
      sobelow:
        type: boolean
        default: false
        description: Run Sobelow security scanner (Phoenix only)
      postgres:
        type: string
        required: false
        description: "PostgreSQL migrations: 'ash' or 'ecto' (starts service automatically)"
      postgres-image:
        type: string
        default: "postgres"
        description: "Docker image name without tag (e.g., 'timescale/timescaledb'). Combined with postgres-version to form the full image reference."
      postgres-version:
        type: string
        default: "18"
        description: "Docker image tag for the postgres-image (e.g., '18', 'latest-pg18')"
      sqlite:
        type: string
        required: false
        description: "SQLite migrations: 'ash' or 'ecto'"
      npm-install:
        type: boolean
        default: false
        description: Run npm install for assets
      npm-working-directory:
        type: string
        default: assets
        description: Directory for npm install
      npm-registry:
        type: string
        required: false
        description: Custom NPM registry URL (e.g., https://npm.pkg.github.com)
      node-version:
        type: string
        default: latest
        description: Node.js version
      spark-formatter:
        type: boolean
        default: false
        description: Check Spark DSL formatting
      spark-extensions:
        type: string
        required: false
        description: |
          Spark DSL extensions for formatter (multiline, one per line).
          Example:
            spark-extensions: |
              MyApp.Resource.Extension
              MyApp.Another.DSL
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
      env:
        type: string
        required: false
        description: |
          Environment variables to set for all jobs (one KEY=VALUE per line).
          Example:
            env: |
              CLOAK_KEY=base64encodedkey
              MY_OTHER_VAR=value
      artifacts:
        type: string
        required: false
        description: |
          Multiline artifact definitions to download before compilation (one per line, format: name:path).
          Use with actions/upload-artifact in a prior job to inject pre-built binaries.
          Example:
            artifacts: |
              my-binary:apps/my_app/priv/bin
              my-assets:apps/my_app/priv/static
      services:
        type: string
        required: false
        description: |
          Multiline YAML list of Docker sidecar services to run alongside tests.
          Each entry supports: name (required), image (required), ports, env,
          volumes, options, health-cmd, health-timeout. Ports are published on
          localhost. Containers share the 'ci-services' network and are removed
          automatically at the end of the test job.
          Example:
            services: |
              - name: redis
                image: redis:7-alpine
                ports: 6379:6379
                health-cmd: redis-cli ping
              - name: mosquitto
                image: eclipse-mosquitto:2
                ports: 1883:1883
                volumes: ./ci/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories (supports multiple keys)
      npm-token:
        required: false
        description: NPM authentication token for private registries

jobs:
  deps:
    name: Get Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          cache-build: "false"
          directory: ${{ inputs.directory }}
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        env:
          HEX_ORG: ${{ inputs.hex-organization }}
          HEX_ORG_KEY: ${{ secrets.hex-organization-key }}
        run: mix hex.organization auth "${HEX_ORG}" --key "${HEX_ORG_KEY}"
      - uses: intility/reusable-elixir/.github/actions/mix-deps-get@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}

  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    needs: deps
    if: ${{ inputs.audit }}
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          cache-build: "false"
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-hex-audit@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: deps
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
          directory: ${{ inputs.directory }}
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        env:
          HEX_ORG: ${{ inputs.hex-organization }}
          HEX_ORG_KEY: ${{ secrets.hex-organization-key }}
        run: mix hex.organization auth "${HEX_ORG}" --key "${HEX_ORG_KEY}"
      - uses: intility/reusable-elixir/.github/actions/mix-compile@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}

  unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    needs: deps
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          cache-build: "false"
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          task: deps.unlock --check-unused
          directory: ${{ inputs.directory }}

  formatter:
    name: Check Formatting
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          task: format --check-formatted
          directory: ${{ inputs.directory }}
      - name: Prepare Spark extensions
        if: ${{ inputs.spark-formatter && inputs.spark-extensions != '' }}
        id: spark-extensions
        env:
          SPARK_EXTENSIONS: ${{ inputs.spark-extensions }}
        run: |
          # Convert multiline input to comma-separated string, removing empty lines and trailing commas
          extensions=$(echo "${SPARK_EXTENSIONS}" | grep -v '^$' | tr '\n' ',' | sed 's/,*$//')
          echo "args=--extensions ${extensions}" >> "$GITHUB_OUTPUT"
      - name: Spark (DSL)
        uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.spark-formatter }}
        with:
          mix-env: test
          task: spark.formatter --check ${{ steps.spark-extensions.outputs.args }}
          directory: ${{ inputs.directory }}

  credo:
    name: Credo
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ inputs.credo }}
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          task: credo --strict
          directory: ${{ inputs.directory }}

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    needs: deps
    if: ${{ inputs.dialyzer }}
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: dev
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-dialyzer@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: dev
          directory: ${{ inputs.directory }}

  sobelow:
    name: Sobelow
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ inputs.sobelow }}
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          task: sobelow
          directory: ${{ inputs.directory }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    services:
      postgres:
        image: ${{ inputs.postgres != '' && format('{0}:{1}', inputs.postgres-image, inputs.postgres-version) || '' }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          working-directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/install-elixir@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/mix-cache@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        with:
          mix-env: test
          directory: ${{ inputs.directory }}
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
          directory: ${{ inputs.directory }}

      - name: Start Docker services
        if: ${{ inputs.services != '' }}
        uses: intility/reusable-elixir/.github/actions/docker-services-up@52e1ceb799e920d25de010c99a2874141dac5623
        with:
          services: ${{ inputs.services }}

      - name: Setup Node
        if: ${{ inputs.npm-install }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.npm-registry }}
          cache: npm
          cache-dependency-path: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}/package-lock.json

      - name: Run npm install
        if: ${{ inputs.npm-install }}
        run: npm ci
        working-directory: ${{ inputs.directory }}/${{ inputs.npm-working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      # Ash PostgreSQL
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.generate_migrations --check
          directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.create
          directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.migrate
          directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.migrate --tenants
          directory: ${{ inputs.directory }}

      # Ecto PostgreSQL
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ecto' }}
        with:
          mix-env: test
          task: ecto.create
          directory: ${{ inputs.directory }}

      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.postgres == 'ecto' }}
        with:
          mix-env: test
          task: ecto.migrate
          directory: ${{ inputs.directory }}

      # Ash SQLite
      - uses: intility/reusable-elixir/.github/actions/mix-task@a778bb81048836a3239b47dcfaaf1f8b8760df97 # v2.1.0
        if: ${{ inputs.sqlite == 'ash' }}
        with:
          mix-env: test
          task: ash_sqlite.generate_migrations --check
          directory: ${{ inputs.directory }}

