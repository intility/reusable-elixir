name: Test Elixir

on:
  workflow_call:
    inputs:
      elixir-version:
        type: string
        required: false
        description: Elixir version (uses .tool-versions if not specified)
      otp-version:
        type: string
        required: false
        description: Erlang/OTP version (uses .tool-versions if not specified)
      audit:
        type: boolean
        default: true
        description: Run hex.audit and deps.audit
      credo:
        type: boolean
        default: true
        description: Run Credo static analysis
      dialyzer:
        type: boolean
        default: false
        description: Run Dialyzer type checking
      sobelow:
        type: boolean
        default: false
        description: Run Sobelow security scanner (Phoenix only)
      postgres:
        type: string
        required: false
        description: "PostgreSQL migrations: 'ash' or 'ecto' (starts service automatically)"
      postgres-version:
        type: string
        default: "18"
        description: PostgreSQL version
      sqlite:
        type: string
        required: false
        description: "SQLite migrations: 'ash' or 'ecto'"
      npm-install:
        type: boolean
        default: false
        description: Run npm install for assets
      npm-working-directory:
        type: string
        default: assets
        description: Directory for npm install
      npm-registry:
        type: string
        required: false
        description: Custom NPM registry URL (e.g., https://npm.pkg.github.com)
      node-version:
        type: string
        default: latest
        description: Node.js version
      spark-formatter:
        type: boolean
        default: false
        description: Check Spark DSL formatting
      spark-extensions:
        type: string
        required: false
        description: |
          Spark DSL extensions for formatter (multiline, one per line).
          Example:
            spark-extensions: |
              MyApp.Resource.Extension
              MyApp.Another.DSL
      hex-organization:
        type: string
        required: false
        description: Hex organization for private packages
      apt-packages:
        type: string
        required: false
        description: Space-separated list of APT packages to install (e.g., libvips-dev imagemagick)
      env:
        type: string
        required: false
        description: |
          Environment variables to set for all jobs (one KEY=VALUE per line).
          Example:
            env: |
              CLOAK_KEY=base64encodedkey
              MY_OTHER_VAR=value
      artifacts:
        type: string
        required: false
        description: |
          Multiline artifact definitions to download before compilation (one per line, format: name:path).
          Use with actions/upload-artifact in a prior job to inject pre-built binaries.
          Example:
            artifacts: |
              my-binary:apps/my_app/priv/bin
              my-assets:apps/my_app/priv/static
    secrets:
      hex-organization-key:
        required: false
        description: Hex organization authentication key
      ssh-private-key:
        required: false
        description: SSH private key(s) for accessing private Git repositories (supports multiple keys)
      npm-token:
        required: false
        description: NPM authentication token for private registries

jobs:
  deps:
    name: Get Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        run: mix hex.organization auth ${{ inputs.hex-organization }} --key ${{ secrets.hex-organization-key }}
      - uses: team-alembic/staple-actions/actions/mix-deps-get@a74b3b61209d35d45526df174766632f8aee03ed # main
      - name: Compile dependencies
        run: mix deps.compile
        env:
          MIX_ENV: test
          HEX_HOME: ${{ runner.temp }}/.hex
          MIX_HOME: ${{ runner.temp }}/.mix

  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    needs: deps
    if: ${{ inputs.audit }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - uses: team-alembic/staple-actions/actions/mix-hex-audit@a74b3b61209d35d45526df174766632f8aee03ed # main

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@main
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: intility/reusable-elixir/.github/actions/ssh-agent@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@main
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}
      - name: Authorize Hex organization
        if: ${{ inputs.hex-organization != '' }}
        run: mix hex.organization auth ${{ inputs.hex-organization }} --key ${{ secrets.hex-organization-key }}
      - uses: team-alembic/staple-actions/actions/mix-compile@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test

  unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test
          task: deps.unlock --check-unused
          compile: "false"

  formatter:
    name: Check Formatting
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test
          task: format --check-formatted
          compile: "false"
      - name: Prepare Spark extensions
        if: ${{ inputs.spark-formatter && inputs.spark-extensions != '' }}
        id: spark-extensions
        run: |
          # Convert multiline input to comma-separated string, removing empty lines and trailing commas
          extensions=$(echo "${{ inputs.spark-extensions }}" | grep -v '^$' | tr '\n' ',' | sed 's/,*$//')
          echo "args=--extensions ${extensions}" >> $GITHUB_OUTPUT
      - name: Spark (DSL)
        uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.spark-formatter }}
        with:
          mix-env: test
          task: spark.formatter --check ${{ steps.spark-extensions.outputs.args }}
          compile: "false"

  credo:
    name: Credo
    runs-on: ubuntu-latest
    needs: deps
    if: ${{ inputs.credo }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test
          task: credo --strict
          compile: "false"

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ inputs.dialyzer }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
      - uses: team-alembic/staple-actions/actions/mix-dialyzer@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test

  sobelow:
    name: Sobelow
    runs-on: ubuntu-latest
    needs: deps
    if: ${{ inputs.sobelow }}
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
          cache-build: "false"
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test
          task: sobelow
          compile: "false"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: ${{ inputs.postgres != '' && format('postgres:{0}', inputs.postgres-version) || '' }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: intility/reusable-elixir/.github/actions/set-env@main
        if: ${{ inputs.env != '' }}
        with:
          env: ${{ inputs.env }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: intility/reusable-elixir/.github/actions/apt-packages@main
        if: ${{ inputs.apt-packages != '' }}
        with:
          packages: ${{ inputs.apt-packages }}
      - uses: intility/reusable-elixir/.github/actions/setup-tool-versions@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
      - uses: team-alembic/staple-actions/actions/install-elixir@a74b3b61209d35d45526df174766632f8aee03ed # main
      - uses: intility/reusable-elixir/.github/actions/mix-cache@main
        with:
          mix-env: test
      - uses: intility/reusable-elixir/.github/actions/download-artifacts@main
        if: ${{ inputs.artifacts != '' }}
        with:
          artifacts: ${{ inputs.artifacts }}

      - name: Setup Node
        if: ${{ inputs.npm-install }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.npm-registry }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Run npm install
        if: ${{ inputs.npm-install }}
        run: npm ci
        working-directory: ${{ inputs.npm-working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      # Ash PostgreSQL
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.generate_migrations --check

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.create

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.migrate

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ash' }}
        with:
          mix-env: test
          task: ash_postgres.migrate --tenants

      # Ecto PostgreSQL
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ecto' }}
        with:
          mix-env: test
          task: ecto.create

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.postgres == 'ecto' }}
        with:
          mix-env: test
          task: ecto.migrate

      # Ash SQLite
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.sqlite == 'ash' }}
        with:
          mix-env: test
          task: ash_sqlite.generate_migrations --check

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.sqlite == 'ash' }}
        with:
          mix-env: test
          task: ash_sqlite.create

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.sqlite == 'ash' }}
        with:
          mix-env: test
          task: ash_sqlite.migrate

      # Ecto SQLite
      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.sqlite == 'ecto' }}
        with:
          mix-env: test
          task: ecto.create

      - uses: team-alembic/staple-actions/actions/mix-task@a74b3b61209d35d45526df174766632f8aee03ed # main
        if: ${{ inputs.sqlite == 'ecto' }}
        with:
          mix-env: test
          task: ecto.migrate

      # Run tests
      - uses: team-alembic/staple-actions/actions/mix-test@a74b3b61209d35d45526df174766632f8aee03ed # main
        with:
          mix-env: test
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
